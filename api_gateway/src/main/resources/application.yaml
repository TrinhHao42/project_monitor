server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api_gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: authenticate_service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
  data:
    redis:
      host: localhost
      port: 6379

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
    instances:
      myRetry:
        base-config: default


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
