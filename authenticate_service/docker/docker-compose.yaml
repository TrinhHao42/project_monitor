services:
  postgres:
    image: postgres:18-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:8.2.4-alpine3.22
    container_name: gateway_redis
    ports:
      - "6379:6379"

volumes:
   pg_data: